name: Run Tests

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout cicd repo
              uses: actions/checkout@v4

            - name: Checkout backend
              uses: actions/checkout@v4
              with:
                  repository: anthony-openclassroom/device34-backend
                  path: device34-backend

            - name: Checkout frontend
              uses: actions/checkout@v4
              with:
                  repository: anthony-openclassroom/device34-frontend
                  path: device34-frontend

            - name: Setup Java 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install Chrome
              uses: browser-actions/setup-chrome@v1

            - name: Install frontend dependencies
              run: npm ci
              working-directory: device34-frontend

            - name: Run tests
              run: |
                  chmod +x ./run-tests.sh
                  ./run-tests.sh .

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results
                  path: test-results/
