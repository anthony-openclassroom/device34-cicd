name: Template – Release

on:
    workflow_call:
        inputs:
            extra-plugins:
                required: false
                type: string
                default: ""

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            packages: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Run semantic-release
              id: semantic
              uses: cycjimmy/semantic-release-action@v4
              with:
                  extra_plugins: ${{ inputs.extra-plugins }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Re-tag Docker image
              if: steps.semantic.outputs.new_release_published == 'true'
              env:
                  VERSION: ${{ steps.semantic.outputs.new_release_version }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  SHORT_SHA=${GITHUB_SHA:0:7}
                  echo "${GH_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                  docker pull ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}
                  docker tag ghcr.io/${{ github.repository }}:sha-${SHORT_SHA} ghcr.io/${{ github.repository }}:${VERSION}
                  docker push ghcr.io/${{ github.repository }}:${VERSION}
